name: Build Mu WhatsApp APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Android APK
        uses: WebView-App/web-to-apk-action@v1
        with:
          app-name: 'Mu WhatsApp'
          package-name: 'com.muu.whatsapp'
          website-url: ''
          local-html: 'index.html'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mu-WhatsApp-APK
          path: app-release.apk
